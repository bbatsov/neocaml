name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    # The snapshot (Emacs master) job is allowed to fail: it currently hits an
    # upstream Emacs-master regression where a `syntax-propertize-function' in a
    # tree-sitter mode crashes `treesit-query-capture' during font-lock. All
    # released Emacs versions are unaffected. Remove this once the regression is
    # fixed upstream.
    continue-on-error: ${{ matrix.emacs-version == 'snapshot' }}
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - 29.4
          - 30.1
          - snapshot
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - uses: emacs-eldev/setup-eldev@v1

      - name: Install tree-sitter grammars
        run: |
          eldev eval '(neocaml-install-grammars)'
          eldev eval '(progn (load "neocaml-opam") (neocaml-opam-install-grammar))'
          eldev eval '(progn (load "neocaml-dune") (neocaml-dune-install-grammar))'
          eldev eval '(progn (load "neocaml-ocamllex") (neocaml-ocamllex-install-grammar))'
          eldev eval '(progn (load "neocaml-menhir") (neocaml-menhir-install-grammar))'

      - run: eldev byte-compile --warnings-as-errors

      - run: eldev test

      - run: eldev lint
