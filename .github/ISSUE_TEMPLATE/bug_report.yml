name: Bug Report
description: Report an issue you've discovered.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please make sure you're running the latest stable neocaml and that the
        problem hasn't been reported (and potentially fixed) already.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of neocaml is affected?
      options:
        - Font-locking (syntax highlighting)
        - Indentation
        - Navigation
        - REPL
        - Eglot / LSP
        - Other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: |
        Providing a reliable way to reproduce the problem will expedite its
        solution. Please include a minimal OCaml code snippet if applicable.
      placeholder: |
        1. Open a buffer with the following OCaml code:
           ```ocaml
           let x = 42
           ```
        2. Place point at ...
        3. Run `M-x some-command`
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Run `M-x neocaml-bug-report-info` and paste the output here.
        The command copies the information to your kill ring automatically.
      placeholder: |
        Emacs: 30.1
        System: darwin
        neocaml: 0.3.0
        Tree-sitter ABI: 15
        Grammars: ocaml (expected: v0.24.2), ocaml-interface (expected: v0.24.2)
        Eglot: active
      render: text
    validations:
      required: true
